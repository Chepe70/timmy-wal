name: Update Timmy Ticker

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-ticker
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python scripts/update_timmy.py

      - name: Commit changes if any
        run: |
          git config user.name "timmy-bot"
          git config user.email "timmy-bot@users.noreply.github.com"
          git add updates.json logs/scraper.log || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ticker: update $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
